# This is a Databricks asset bundle definition for workflow_test_automation_blueprint.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: workflow_test_automation_blueprint

include:
  - resources/*.yml

artifacts:
  default:
    type: whl
    build: uv build --wheel --package ps_test_blueprint
    path: .

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://adb-xxxx.x.azuredatabricks.net

  prod:
    mode: production
    workspace:
      host: https://adb-xxxx.x.azuredatabricks.net
      root_path: /Workspace/tests/.bundle/${bundle.name}/${bundle.target}
    permissions:
      - user_name: example@email.com
        level: CAN_MANAGE
    run_as:
      user_name: example@email.com
